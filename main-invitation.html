<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Main Invitation</title>

<style>

html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    overflow-y: auto;
    font-family: Arial, sans-serif;
    animation: fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.gallery {
    width: 100vw;
    line-height: 0;
}

.gallery img {
    width: 100vw;
    height: auto;
    display: block;
}

.page4 {
    position: relative;
    width: 100vw;
}

/* COUNTDOWN */
.countdown {
    position: absolute;
    top: 26%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 12px;
}

.time-box {
    width: 18vw;
    height: 22vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    border-radius: 20px;
}

.number {
    font-size: 7vw;
    font-weight: bold;
    color: white;
}

.label {
    font-size: 2.5vw;
    color: white;
}

/* MAP */
.map-container {
    position: absolute;
    top: 52%;
    left: 50%;
    transform: translateX(-50%);
    width: 70vw;
    height: 70vw;
}

.map-container iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

/* MUSIC BUTTON */
#music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;

    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;

    font-size: 24px;
    cursor: pointer;

    background: rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<div class="gallery">

    <img src="2.png">
    <img src="3.png">

    <!-- PAGE 4 (WITH COUNTDOWN + MAP) -->
    <div class="page4">
        <img src="4.png">

        <div class="countdown">
            <div class="time-box">
                <div class="number" id="days">0</div>
                <div class="label">DAYS</div>
            </div>
            <div class="time-box">
                <div class="number" id="hours">0</div>
                <div class="label">HOURS</div>
            </div>
            <div class="time-box">
                <div class="number" id="minutes">0</div>
                <div class="label">MIN</div>
            </div>
            <div class="time-box">
                <div class="number" id="seconds">0</div>
                <div class="label">SEC</div>
            </div>
        </div>

        <div class="map-container">
            <iframe src="https://www.google.com/maps?q=Casa+Hava+Sta+Ana+Manila&output=embed"></iframe>
        </div>
    </div>

    <img src="5.png">
    <img src="6.png">
    <img src="7.png">
    <img src="8.png">
    <img src="9.png">
    <img src="10.png">
    <img src="11.png">
    <img src="12.png">
    <img src="13.png">
    <img src="14.png">
    <img src="15.png">
    <img src="16.png">
    <img src="17.png">

</div>

<!-- 🎵 MUSIC -->
<audio id="bg-music" loop autoplay muted>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="music-btn">🔇</button>

<script>
const music = document.getElementById("bg-music");
const btn = document.getElementById("music-btn");

music.volume = 0.4;

// autoplay fix
window.addEventListener("load", () => {
    music.play().then(() => {

        setTimeout(() => {
            music.muted = false;
            btn.innerHTML = "🔊";
        }, 1000);

    }).catch(() => {
        document.addEventListener("click", () => {
            music.muted = false;
            music.play();
            btn.innerHTML = "🔊";
        }, { once: true });
    });
});

// toggle button
btn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        music.muted = false;
        btn.innerHTML = "🔊";
    } else {
        music.pause();
        btn.innerHTML = "🔇";
    }
});
</script>

</body>
</html>
