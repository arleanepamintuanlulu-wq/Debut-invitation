<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Main Invitation</title>

<style>

html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: Arial, sans-serif;
}

/* GALLERY */
.gallery {
    width: 100vw;
    line-height: 0;
}

.gallery img {
    width: 100vw;
    display: block;
}

/* PAGE 4 */
.page4 {
    position: relative;
}

/* COUNTDOWN */
.countdown {
    position: absolute;
    top: 26%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
}

.time-box {
    width: 18vw;
    height: 24vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    border-radius: 20px;
}

.number {
    font-size: 7vw;
    color: white;
    font-weight: bold;
}

.label {
    font-size: 2.5vw;
    color: white;
    margin-top: 8px;
}

/* MAP */
.map-container {
    position: absolute;
    top: 52%;
    left: 50%;
    transform: translateX(-50%);
    width: 70vw;
    height: 70vw;
}

.map-container iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

/* 💙 IMAGE 17 CONTAINER */
.page17 {
    position: relative;
}

/* 💙 HEART FIXED SA IMAGE 17 LANG */
.rsvp-heart {
    position: absolute;
    bottom: 80px; /* nakaangat */
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;

    font-size: 60px;
    color: #1e3a8a;

    text-shadow:
        0 0 10px rgba(255,255,255,1),
        0 0 20px rgba(30,58,138,1);

    animation: pulse 1.5s infinite;
    cursor: pointer;
}

@keyframes pulse {
    0%,100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.15); }
}

/* MUSIC BUTTON */
#music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;

    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    background: rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<div class="gallery">

<img src="2.png">
<img src="3.png">

<div class="page4">
    <img src="4.png">

    <div class="countdown">
        <div class="time-box">
            <div id="days" class="number">0</div>
            <div class="label">DAYS</div>
        </div>
        <div class="time-box">
            <div id="hours" class="number">0</div>
            <div class="label">HOURS</div>
        </div>
        <div class="time-box">
            <div id="minutes" class="number">0</div>
            <div class="label">MIN</div>
        </div>
        <div class="time-box">
            <div id="seconds" class="number">0</div>
            <div class="label">SEC</div>
        </div>
    </div>

    <div class="map-container">
        <iframe src="https://www.google.com/maps?q=Casa+Hava+Sta+Ana+Manila&output=embed"></iframe>
    </div>
</div>

<img src="5.png">
<img src="6.png">
<img src="7.png">
<img src="8.png">
<img src="9.png">
<img src="10.png">
<img src="11.png">
<img src="12.png">
<img src="13.png">
<img src="14.png">
<img src="15.png">
<img src="16.png">

<!-- 💙 IMAGE 17 WITH HEART -->
<div class="page17">
    <img src="17.png">

    <a href="https://docs.google.com/forms/d/e/1FAIpQLScU7wI7EPzUM52fvXDfEvZxhGZOM4b5N3s2jWppuLyYfVmftw/viewform?usp=header" target="_blank">
        <div class="rsvp-heart">💙</div>
    </a>
</div>

</div>

<!-- 🎵 MUSIC -->
<audio id="bg-music" loop autoplay muted>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="music-btn">🔇</button>

<script>
// MUSIC
const music = document.getElementById("bg-music");
const btn = document.getElementById("music-btn");

music.volume = 0.4;

window.addEventListener("load", () => {
    music.play().then(() => {
        setTimeout(() => {
            music.muted = false;
            btn.innerHTML = "🔊";
        }, 1000);
    }).catch(() => {
        document.addEventListener("click", () => {
            music.muted = false;
            music.play();
            btn.innerHTML = "🔊";
        }, { once: true });
    });
});

btn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        btn.innerHTML = "🔊";
    } else {
        music.pause();
        btn.innerHTML = "🔇";
    }
});

// ⏳ COUNTDOWN (PH TIME FIXED)
const targetDate = new Date("2026-05-02T18:00:00+08:00");

function updateCountdown() {
    const now = new Date();
    const gap = targetDate - now;

    if (gap <= 0) return;

    document.getElementById("days").innerText = Math.floor(gap / (1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((gap / (1000*60*60)) % 24);
    document.getElementById("minutes").innerText = Math.floor((gap / (1000*60)) % 60);
    document.getElementById("seconds").innerText = Math.floor((gap / 1000) % 60);
}

setInterval(updateCountdown, 1000);
updateCountdown();

</script>

</body>
</html>
