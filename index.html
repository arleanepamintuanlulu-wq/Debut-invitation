<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow-y: auto;
        background: #ffffff;
    }

    .container {
        position: relative;
        width: 100vw;
        height: auto;
    }

    .invitation {
        width: 100vw;
        height: auto;
        display: block;
    }

    .envelope-icon {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 40vw;
        z-index: 10;
        cursor: pointer;
        transition: transform 0.6s ease, opacity 0.6s ease;
    }

    .open {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 0;
    }
</style>
</head>

<body>

<div class="container">
    <img src="your-image.png" class="invitation">
    <div class="envelope-icon" onclick="openEnvelope()">✉️</div>
</div>

<!-- MUSIC -->
<audio id="bg-music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");

// 🔥 PLAY WHEN ENVELOPE CLICKED (BEST TRIGGER)
function openEnvelope() {
    const envelope = document.querySelector('.envelope-icon');

    // PLAY MUSIC
    music.volume = 1;
    music.currentTime = 0;

    music.play().then(() => {
        console.log("Music playing ✅");

        // ⏳ WAIT para marinig mo bago lumipat
        setTimeout(() => {
            window.location.href = "main-invitation.html";
        }, 2500); // 2.5 seconds

    }).catch(err => {
        console.log("Error:", err);

        // fallback
        setTimeout(() => {
            window.location.href = "main-invitation.html";
        }, 2500);
    });

    envelope.classList.add('open');
}
</script>

</body>
</html>
